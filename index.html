<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AirBags</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#121212">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <span id="ble-status">No Device Selected</span>
      <div style="margin-top: 15px;">
        <button id="btn-sync" class="sync-btn active">SYNC: ON</button>
      </div>
    </div>

    <div class="controls-container">
      <!-- LEFT CONTROLS -->
      <div class="side-control">
        <button class="arrow-btn" id="btn-left-up">
          <svg viewBox="0 0 24 24"><path d="M12 2L22 20H2Z" fill="currentColor"/></svg>
        </button>
        <div class="psi-display">
          <div class="psi-target">
             <span class="psi-value target" id="target-left">0</span>
             <span class="psi-label">SET</span>
          </div>
          <div class="psi-current">
             <span class="psi-value" id="val-left">---</span>
             <span class="psi-label">PSI</span>
          </div>
        </div>
        <button class="arrow-btn btn-down" id="btn-left-down">
          <svg viewBox="0 0 24 24"><path d="M12 22L2 4H22Z" fill="currentColor"/></svg>
        </button>
      </div>


      <!-- RIGHT CONTROLS -->
      <div class="side-control">
        <button class="arrow-btn" id="btn-right-up">
          <svg viewBox="0 0 24 24"><path d="M12 2L22 20H2Z" fill="currentColor"/></svg>
        </button>
        <div class="psi-display">
          <div class="psi-target">
             <span class="psi-value target" id="target-right">0</span>
             <span class="psi-label">SET</span>
          </div>
          <div class="psi-current">
             <span class="psi-value" id="val-right">---</span>
             <span class="psi-label">PSI</span>
          </div>
        </div>
        <button class="arrow-btn btn-down" id="btn-right-down">
          <svg viewBox="0 0 24 24"><path d="M12 22L2 4H22Z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- ACTION START BUTTON -->
    <div class="action-container">
       <button class="start-btn disabled" id="btn-start">SET</button>
    </div>

    <!-- TANK PRESSURE DISPLAY -->
    <div class="tank-container">
      <div class="tank-label">AIR TANK</div>
      <div class="tank-value-wrapper">
        <span class="tank-value" id="val-tank">---</span>
        <span class="tank-unit">PSI</span>
      </div>
    </div>

    <div class="connect-container">
      <button class="connect-btn" id="btn-connect">CONNECT</button>
      <button class="connect-btn" id="btn-graph" style="margin-top: 10px; background-color: #3f51b5; display: none;">VIEW GRAPH</button>
      <button class="start-btn" id="btn-dump" style="margin-top: 15px; background-color: #ff3b30; width: 100%; font-size: 20px; touch-action: manipulation;">EMPTY AIR TANK</button>
    </div>

    <!-- GRAPH MODAL -->
    <div id="graph-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="btn-close-graph">&times;</span>
        <h2 style="color: black; margin-top: 0;">Pressure History</h2>
        <div style="position: relative; height: 60vh; width: 100%;">
          <canvas id="pressureChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
